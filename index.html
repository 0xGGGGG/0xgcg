<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- routes like /layout resolve relative assets (styles, src, assets/) from root -->
  <base href="/" />
  <title>0xGCG — Grow. Corrupt. Glitch.</title>
  <link rel="stylesheet" href="styles.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app"></div>

  <div id="ui">
    <header id="topbar">
      <div class="brand">
        <span id="proj-code">0xGCG</span>
        <span id="proj-title">Grow. Corrupt. Glitch.</span>
      </div>
      <nav id="view-nav">
        <button data-view="core" class="on">Core</button>
        <button data-view="layout">Layout</button>
      </nav>
      <button id="addr-trigger" title="Open the cosmic address (A)">
        <span class="av-venue" id="proj-venue">Kunstkraftwerk · Leipzig</span>
        <span class="av-sub"><span id="av-coords">—</span> · <span id="av-date">—</span></span>
      </button>
    </header>

    <section id="panel"></section>

    <!-- the timeline Player (Core acts / Layout cycle) mounts here -->
    <div id="player-mount"></div>

    <!-- Layout mode chrome -->
    <div id="layout-loading">loading room model…</div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
