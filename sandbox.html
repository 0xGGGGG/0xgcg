<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="/" />
  <title>0xGCG · Sandbox — growth lab</title>
  <style>
    :root { --fg:#cfe0d8; --dim:#6f7d77; --acc:#27e0a0; }
    * { box-sizing:border-box; }
    html,body { margin:0; height:100%; background:#04060a; color:var(--fg);
      font:12px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; overflow:hidden; }
    #c { position:fixed; inset:0; width:100%; height:100%; display:block; }
    .hud { position:fixed; z-index:2; }
    #panel { left:18px; top:18px; width:230px; padding:14px 14px 12px;
      background:rgba(4,6,10,.62); border:1px solid rgba(39,224,160,.22);
      border-radius:8px; backdrop-filter:blur(6px); }
    #panel h1 { margin:0 0 2px; font-size:13px; letter-spacing:.16em; color:#fff; }
    #panel .sub { color:var(--dim); letter-spacing:.06em; margin-bottom:10px; }
    .phase { display:flex; align-items:baseline; gap:8px; margin:8px 0 10px; }
    .phase b { font-size:15px; letter-spacing:.18em; color:var(--acc); }
    .phase span { color:var(--dim); }
    .legend { list-style:none; margin:8px 0 0; padding:0; }
    .legend li { display:flex; align-items:center; gap:8px; padding:1px 0; color:var(--dim); }
    .legend li.on { color:var(--fg); }
    .legend i { width:8px; height:8px; border-radius:2px; flex:none; opacity:.5; }
    .legend li.on i { opacity:1; box-shadow:0 0 8px currentColor; }
    #ctl { left:18px; bottom:18px; width:230px; padding:12px 14px;
      background:rgba(4,6,10,.62); border:1px solid rgba(39,224,160,.22);
      border-radius:8px; backdrop-filter:blur(6px); }
    #ctl .row { display:flex; gap:6px; margin-bottom:8px; }
    #ctl button { flex:1; padding:6px 4px; cursor:pointer; color:var(--fg);
      background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.14);
      border-radius:5px; font:inherit; letter-spacing:.04em; }
    #ctl button:hover { border-color:var(--acc); color:#fff; }
    #ctl label { display:block; color:var(--dim); margin:6px 0 2px; letter-spacing:.05em; }
    #ctl input[type=range] { width:100%; accent-color:var(--acc); }
    .hint { position:fixed; right:16px; bottom:14px; color:var(--dim); z-index:2; }
    a.back { color:var(--dim); text-decoration:none; }
    a.back:hover { color:var(--acc); }
    .legend li { cursor:pointer; }
    .legend li.sel { color:#fff; }
    .legend li.sel i { box-shadow:0 0 10px currentColor; }
    #params { right:18px; top:18px; width:248px; max-height:calc(100vh - 36px); overflow:auto;
      padding:12px 14px; background:rgba(4,6,10,.62); border:1px solid rgba(39,224,160,.22);
      border-radius:8px; backdrop-filter:blur(6px); }
    #params h2 { margin:0 0 2px; font-size:12px; letter-spacing:.12em; color:#fff; }
    #params .psub { color:var(--dim); margin-bottom:10px; }
    #params .prow { margin-bottom:9px; }
    #params .prow label { display:flex; justify-content:space-between; color:var(--dim); margin-bottom:2px; }
    #params .prow label b { color:var(--fg); font-weight:400; }
    #params input[type=range] { width:100%; accent-color:var(--acc); }
    #params .prow-btns { display:flex; gap:6px; margin-top:10px; }
    #params button { flex:1; padding:6px 4px; cursor:pointer; color:var(--fg);
      background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.14);
      border-radius:5px; font:inherit; letter-spacing:.04em; }
    #params button:hover { border-color:var(--acc); color:#fff; }
    .mode-select { width:100%; -webkit-appearance:none; appearance:none;
      font:inherit; font-size:15px; font-weight:600; letter-spacing:.12em; text-transform:uppercase;
      color:#fff; background:rgba(39,224,160,.08); border:1px solid rgba(39,224,160,.4);
      border-radius:7px; padding:10px 32px 10px 12px; cursor:pointer; transition:all .15s;
      background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' fill='none' stroke='%2327e0a0' stroke-width='1.6'/></svg>");
      background-repeat:no-repeat; background-position:right 12px center; }
    .mode-select:hover { border-color:rgba(39,224,160,.75); background-color:rgba(39,224,160,.16); }
    .mode-select:focus { outline:none; border-color:var(--acc); box-shadow:0 0 12px rgba(39,224,160,.3); }
    .mode-select option { background:#0a1310; color:#cfe0d8; font-size:13px; letter-spacing:normal; text-transform:none; }
    /* split picker: click the label to cycle, click the caret to open the list */
    .picker { position:relative; display:flex; align-items:stretch; width:100%; border-radius:7px; overflow:hidden;
      border:1px solid rgba(255,255,255,.16); background:rgba(255,255,255,.05); }
    .picker.type { border-color:rgba(39,224,160,.4); background:rgba(39,224,160,.08); }
    .pick-main { flex:1; min-width:0; font:inherit; color:#fff; background:none; border:none; cursor:pointer;
      padding:9px 10px; letter-spacing:.06em; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .picker.type .pick-main { font-size:15px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; }
    .pick-main:hover { background:rgba(255,255,255,.06); }
    .picker.type .pick-main:hover { background:rgba(39,224,160,.12); }
    .pick-caret { flex:0 0 auto; width:34px; display:inline-flex; align-items:center; justify-content:center;
      color:var(--acc); border-left:1px solid rgba(255,255,255,.14); pointer-events:none; }
    .picker.type .pick-caret { border-left-color:rgba(39,224,160,.3); }
    .picker:hover .pick-caret { color:#fff; }
    .pick-sel { position:absolute; right:0; top:0; width:34px; height:100%; opacity:0; cursor:pointer; z-index:2; border:0; }
    .pick-sel option { background:#0a1310; color:#cfe0d8; font-size:13px; letter-spacing:normal; text-transform:none; }
    /* transport merged into the params panel */
    #transport { padding-bottom:10px; margin-bottom:10px; border-bottom:1px solid rgba(255,255,255,.1); }
    #transport .row { display:flex; gap:6px; margin-bottom:8px; }
    #transport .row button { flex:1; min-width:0; aspect-ratio:1; padding:0; cursor:pointer; color:var(--fg);
      background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.14); border-radius:6px; font:inherit;
      display:inline-flex; align-items:center; justify-content:center; }
    #transport button svg { display:block; flex:0 0 auto; }
    #transport .row button:hover { border-color:var(--acc); color:#fff; background:rgba(255,255,255,.07); }
    #transport label { display:block; color:var(--dim); margin:6px 0 2px; letter-spacing:.05em; }
    #transport input[type=range] { width:100%; accent-color:var(--acc); }
    #transport .seedrow { display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
    #seed-val { width:56px; font:inherit; color:#fff; background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.16); border-radius:4px; padding:2px 5px; letter-spacing:.05em; }
    #seed-val:focus { outline:none; border-color:var(--acc); }
    #b-share { color:var(--acc); }
    /* per-param lock */
    #params-body .prow label { align-items:center; }
    .plock { cursor:pointer; margin-right:5px; opacity:.5; font-size:11px; user-select:none; }
    .plock.on { opacity:1; color:var(--acc); }
    /* collapse/expand + share are icon-only action buttons */
    /* collapsed: keep action bar, time/phase, type + preset; hide sliders + seed/share */
    #params.collapsed .pbody { display:none; }
    #params.collapsed .seedrow { display:none; }
    #ph-name { color:var(--acc); }
    /* mobile: params a scrollable bottom sheet, collapsed to just the action bar by default */
    @media (max-width:720px) {
      #params { left:8px; right:8px; width:auto; top:auto; bottom:8px; max-height:64vh; }
      .hint { font-size:10px; left:8px; right:auto; bottom:6px; }
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div id="params" class="hud">
    <div id="transport">
      <div class="row">
        <button id="b-play" title="play / pause">❚❚</button>
        <button id="b-reset" title="reset params to defaults">reset</button>
        <button id="b-seed" title="roll — randomise unlocked params + new seed">roll</button>
        <button id="b-share" title="copy shareable link"></button>
        <button id="b-save" title="save preset to this browser"></button>
        <button id="b-collapse" title="collapse / expand panel"></button>
      </div>
      <label>cycle <span id="c-val"></span> · <b id="ph-name">INIT</b> <span id="ph-num" style="opacity:.6"></span></label>
      <input id="scrub" type="range" min="0" max="1000" value="0" />
      <label class="seedrow">dimension <span id="dim-val">0</span> · seed <input id="seed-val" type="text" spellcheck="false" title="edit seed (hex) · Enter to apply"></label>
    </div>
    <div id="params-body"></div>
  </div>

  <div class="hint">space play · r roll · <a class="back" href="/">← 0xGCG</a></div>

  <script type="module" src="/src/lab/sandbox.js"></script>
</body>
</html>
